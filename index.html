<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Flutter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<div class="container">

  <div class="envelope">

    <!-- BACK PANEL -->
    <div class="env-body"></div>

    <!-- FLAPS -->
    <div class="flap top"></div>
    <div class="flap left"></div>
    <div class="flap right"></div>

    <!-- PAPER -->
    <div class="paper">
      <h1 class="title">
        Welcome 2<br>
        The archive
      </h1>

      <ul class="categories">
        <li>books</li>
        <li>movies</li>
        <li>music</li>
        <li>places</li>
        <li>food & recipes</li>
        <li>random lore</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
