<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>floatingflutter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<div class="container">

  <div class="scene">

    <div class="envelope" id="env">

      <!-- BACK -->
      <div class="env-body"></div>

      <!-- FLAPS -->
      <div class="flap top"></div>
      <div class="flap left"></div>
      <div class="flap right"></div>

      <!-- PAPER -->
      <div class="paper">
        <h1 class="title">
          Welcome 2<br>
          The archive
        </h1>

        <ul class="categories">
          <li>books</li>
          <li>movies</li>
          <li>music</li>
          <li>places</li>
          <li>food & recipes</li>
          <li>random lore</li>
        </ul>
      </div>

      <!-- BACK INFO -->
      <div class="back-info">
        <p>@floatingflutter.kr</p>
        <p>your@email.com</p>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html></body>
</html>
