<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>floatingflutter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

  <div class="envelope" id="env">

    <!-- paper -->
    <div class="paper" id="paper">
      <h1>Welcome 2<br>The archive</h1>

      <ul>
        <li>books</li>
        <li>movies</li>
        <li>music</li>
        <li>places</li>
        <li>food & recipes</li>
        <li>random lore</li>
      </ul>
    </div>

    <!-- envelope -->
    <div class="env-body"></div>
    <div class="flap"></div>

    <!-- back -->
    <div class="back">
      <p>@floatingflutter.kr</p>
      <p>your@email.com</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
